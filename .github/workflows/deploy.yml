name: Deployment
on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
env:
  MONGO_DB_NAME: ${{ vars.MONGO_DB_NAME }}
jobs:
  test:
    env:
      MONGODB_CLUSTER_ADDRESS: ${{ vars.MONGODB_CLUSTER_ADDRESS }}
      MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
      MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
      MONGODB_PORT: ${{ vars.MONGODB_PORT }}
      PORT: ${{ vars.PORT }}
    runs-on: ubuntu-slim
    steps:
      - name: Get Code
        uses: actions/checkout@v7
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-deps-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:$PORT
      - name: Run tests
        run: npm test
      - name: Output information
        run: |        
          echo "MONGODB_CLUSTER_ADDRESS: ${{ vars.MONGODB_CLUSTER_ADDRESS }}"
          echo "MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}"
          echo "MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}"
          echo "MONGODB_PORT: ${{ vars.MONGODB_PORT }}"
          echo "MONGO_DB_NAME: ${{ env.MONGO_DB_NAME }}"
  deploy:
    needs: test
    runs-on: ubuntu-slim
    steps:
      - name: Output information
        run: |        
          echo "MONGODB_CLUSTER_ADDRESS: ${{ vars.MONGODB_CLUSTER_ADDRESS }}"
          echo "MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}"
          echo "MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}"
          echo "MONGODB_PORT: ${{ vars.MONGODB_PORT }}"
          echo "MONGO_DB_NAME: ${{ env.MONGO_DB_NAME }}"
